- name: Build Admin locally (frontend + compiled API)
  delegate_to: localhost
  run_once: true
  become: false
  command: bun run build:all
  args:
    chdir: "{{ local_repo }}"
  changed_when: true

- name: Assert out/server/main.js exists
  delegate_to: localhost
  run_once: true
  become: false
  stat: { path: "{{ local_out_dir }}/server/main.js" }
  register: server_bundle

- name: Fail if server bundle missing
  delegate_to: localhost
  run_once: true
  become: false
  fail: { msg: "out/server/main.js missing - build:all failed" }
  when: not server_bundle.stat.exists

- name: Assert out/dist exists
  delegate_to: localhost
  run_once: true
  become: false
  stat: { path: "{{ local_out_dir }}/dist" }
  register: frontend_dist

- name: Fail if frontend dist missing
  delegate_to: localhost
  run_once: true
  become: false
  fail: { msg: "out/dist missing - build:all failed" }
  when: not frontend_dist.stat.exists
