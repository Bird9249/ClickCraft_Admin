- name: Create server release dir
  file:
    path: "{{ server_releases }}/{{ release_id }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: Ensure out/ dir in release
  file:
    path: "{{ server_releases }}/{{ release_id }}/out"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

# Production entry: bun ./index.ts → imports ./out/server/main, serves ./out/dist
- name: Copy production entrypoint (index.ts)
  copy:
    src: "{{ local_repo }}/index.ts"
    dest: "{{ server_releases }}/{{ release_id }}/index.ts"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0644"

- name: Rsync build output (out/dist + out/server)
  synchronize:
    src: "{{ local_out_dir }}/"
    dest: "{{ server_releases }}/{{ release_id }}/out/"
    rsync_opts: ["--delete", "--mkpath"]
  delegate_to: localhost
  become: false

- name: Create shared uploads directory
  file:
    path: "{{ server_shared }}/uploads"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: Link release public/ → shared uploads (Elysia staticPlugin)
  file:
    src: "{{ server_shared }}/uploads"
    dest: "{{ server_releases }}/{{ release_id }}/public"
    state: link
    force: true

- name: Point server current → this release
  file:
    src: "{{ server_releases }}/{{ release_id }}"
    dest: "{{ server_current }}"
    state: link
    force: true

- name: daemon-reload
  command: systemctl daemon-reload

- name: Restart API
  systemd:
    name: "{{ api_service }}"
    state: restarted
    enabled: true

- name: Wait for API service to start
  wait_for:
    port: "{{ api_port }}"
    host: "127.0.0.1"
    delay: 3
    timeout: 45

- name: Check API service status
  systemd:
    name: "{{ api_service }}"
  register: api_status

- name: Fail if API service is not running
  fail:
    msg: "API service {{ api_service }} failed to start"
  when: api_status.status.ActiveState != "active"
