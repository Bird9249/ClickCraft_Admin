# ClickCraft Admin — Bun/Elysia API + SPA (served by index.ts)
app_name: "clickcraft-admin"
app_user: "root"
app_group: "root"

# paths บนเซิร์ฟเวอร์
app_root: "/opt/clickcraft-admin"
server_releases: "{{ app_root }}/releases"
server_current: "{{ app_root }}/current"
server_shared: "{{ app_root }}/shared"

# โฟลเดอร์ repo โลคัล (รัน ansible จากเครื่อง dev)
local_repo: "/home/bird/Desktop/ClickCraft/Admin"
# ผลจาก `bun run build:all` → out/dist (frontend) + out/server (API bundle)
local_out_dir: "{{ local_repo }}/out"
local_sql_dir: "{{ local_repo }}/src/server/platform/db/migrations"

# systemd + พอร์ตภายใน (nginx proxy เข้าพอร์ตนี้)
api_service: "{{ app_name }}"
api_port: 3005

keep_releases: 5

# nginx + Let's Encrypt
api_domain: "admin.clickcraft.dev"
site_url: "https://{{ api_domain }}"
# Website marketing (CORS สำหรับ public leads API)
website_url: "https://clickcraft.dev"

ssl_email: "bkeonavong@gmail.com"
ssl_country: "LA"
ssl_state: "Vientiane"
ssl_organization: "ClickCraft"
