- name: Initial server setup (systemd + nginx + SSL)
  hosts: prod
  become: true
  vars_files:
    - ../group_vars/prod.yml
  vars:
    ansible_roles_path: ../roles
  tasks:
    - name: Ensure app directories exist
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"
      loop:
        - "{{ app_root }}"
        - "{{ server_releases }}"
        - "{{ server_shared }}"
        - "{{ server_shared }}/uploads"

    - name: Create systemd service file
      template:
        src: "[[app_name]].service.j2"
        dest: "/etc/systemd/system/{{ app_name }}.service"
        owner: root
        group: root
        mode: "0644"
      notify:
        - daemon-reload

    - name: Ensure nginx is installed and running
      apt:
        name: nginx
        state: present
        update_cache: true

    - name: Ensure certbot is installed
      apt:
        name:
          - certbot
          - python3-certbot-nginx
        state: present

    - name: Ensure rsync is installed
      apt:
        name: rsync
        state: present

    - name: Start nginx
      systemd:
        name: nginx
        state: started
        enabled: true

    - name: Create web root directory for SSL challenges
      file:
        path: /var/www/html
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Stop nginx before SSL setup
      systemd:
        name: nginx
        state: stopped

    - name: Create temporary HTTP-only config for SSL challenge
      template:
        src: "nginx-admin-http.conf.j2"
        dest: "/etc/nginx/sites-available/{{ app_name }}"
        owner: root
        group: root
        mode: "0644"

    - name: Enable temporary HTTP config
      file:
        src: "/etc/nginx/sites-available/{{ app_name }}"
        dest: "/etc/nginx/sites-enabled/{{ app_name }}"
        state: link
        force: true

    - name: Start nginx for SSL challenge
      systemd:
        name: nginx
        state: started

    - name: Obtain SSL certificate
      command: >
        certbot certonly --nginx
        --non-interactive --agree-tos
        --email {{ ssl_email }}
        --domains {{ api_domain }}
        --expand
      register: api_ssl_result
      failed_when: api_ssl_result.rc not in [0, 1]

    - name: Remove temporary HTTP site enablement
      file:
        path: "/etc/nginx/sites-enabled/{{ app_name }}"
        state: absent

    - name: Create SSL-enabled nginx config
      template:
        src: "nginx-admin.conf.j2"
        dest: "/etc/nginx/sites-available/{{ app_name }}"
        owner: root
        group: root
        mode: "0644"

    - name: Enable SSL nginx config
      file:
        src: "/etc/nginx/sites-available/{{ app_name }}"
        dest: "/etc/nginx/sites-enabled/{{ app_name }}"
        state: link
        force: true

    - name: Test nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false

    - name: Fail if nginx config is invalid
      fail:
        msg: "Nginx configuration test failed: {{ nginx_test.stderr }}"
      when: nginx_test.rc != 0

    - name: Reload nginx
      systemd:
        name: nginx
        state: reloaded

    - name: Setup SSL auto-renewal cron job
      cron:
        name: "SSL Certificate Auto-Renewal ({{ app_name }})"
        minute: "0"
        hour: "2"
        job: "/usr/bin/certbot renew --quiet --nginx --post-hook 'systemctl reload nginx'"
        user: root

  handlers:
    - name: daemon-reload
      command: systemctl daemon-reload

    - name: reload nginx
      systemd:
        name: nginx
        state: reloaded
